<!DOCTYPE html>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #F0F4F8; color: #0F172A; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; font-size: 14px; line-height: 1.7; }

.topbar .title { font-size: 15px; font-weight: 600; }
.container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
.hero { background: linear-gradient(135deg, #0284C7 0%, #0369A1 100%); border-radius: 12px; padding: 32px 36px; margin-bottom: 24px; color: #fff; }
.hero h1 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
.hero .summary { font-size: 14px; color: #E0F2FE; line-height: 1.8; }
.card { background: #FFFFFF; border-radius: 10px; border: 1px solid #E2E8F0; padding: 24px 28px; margin-bottom: 20px; }
.card-title { font-size: 16px; font-weight: 600; color: #0284C7; border-bottom: 2px solid #E0F2FE; padding-bottom: 10px; margin-bottom: 18px; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
.badge-online { background: #DCFCE7; color: #166534; }
.badge-announced { background: #DBEAFE; color: #1E40AF; }
.badge-pending { background: #FEF9C3; color: #854D0E; }
.brand-block { border: 1px solid #E2E8F0; border-radius: 8px; padding: 18px 22px; margin-bottom: 14px; }
.brand-name { font-size: 15px; font-weight: 600; color: #0F172A; margin-bottom: 12px; }
.feature-list { list-style: none; }
.feature-list li { padding: 8px 0; border-bottom: 1px solid #F1F5F9; font-size: 13px; }
.feature-list li:last-child { border-bottom: none; }
.compare-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.compare-table th { background: #F0F4F8; color: #475569; font-weight: 600; padding: 10px 14px; text-align: left; border: 1px solid #E2E8F0; }
.compare-table td { padding: 9px 14px; border: 1px solid #E2E8F0; }
.insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.insight-item { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px; padding: 16px 18px; }
.insight-item .label { font-size: 11px; font-weight: 700; color: #0284C7; margin-bottom: 8px; }
.back-link { display: inline-block; margin-bottom: 20px; color: #0284C7; text-decoration: none; }
.back-link:hover { text-decoration: underline; }

// 渲染报告
function renderReport() {
  const data = competitorData[category] || competitorData['default'];

  document.getElementById('heroTitle').textContent = data.title + ' 竞品分析';
  document.getElementById('heroSummary').textContent = data.summary;
  document.getElementById('reportTitle').textContent = data.title + ' 竞品分析';

  let html = '';

  // 各品牌功能现状
  html += '<div class="card"><div class="card-title">🏢 各品牌功能现状</div>';
  data.brands.forEach(brand => {
    html += `<div class="brand-block">
      <div class="brand-name">${brand.name} <span class="badge badge-online">${brand.status}</span></div>
      <ul class="feature-list">
        ${brand.features.map(f => `<li><span style="color:#94A3B8;font-size:12px;min-width:60px">${f.date}</span> ${f.text}</li>`).join('')}
      </ul>
    </div>`;
  });
  html += '</div>';

  // 横向对比表
  html += '<div class="card"><div class="card-title">📊 横向能力对比</div>';
  html += '<div style="overflow-x:auto"><table class="compare-table"><thead><tr><th>能力维度</th>';
  data.brands.forEach(b => { html += `<th>${b.name}</th>`; });
  html += '</tr></thead><tbody>';
  data.comparison.forEach(row => {
    html += '<tr><td>' + row.dim + '</td>';
    data.brands.forEach(b => {
      const key = b.name.split(' ')[0].toLowerCase().replace('ezviz', 'ezviz').replace('amazon', 'ring').replace('google', 'nest').replace('海康', 'hikvision');
      html += `<td>${row[key] || '❓'}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';

  // 洞察
  html += '<div class="card"><div class="card-title">💡 主要洞察</div>';
  html += '<div class="insight-grid">';
  html += `<div class="insight-item"><div class="label">能力成熟度</div><p>${data.insights.maturity}</p></div>`;
  html += `<div class="insight-item"><div class="label">差异化路径</div><p>${data.insights.differentiation}</p></div>`;
  html += `<div class="insight-item"><div class="label">生态位置</div><p>${data.insights.ecosystem}</p></div>`;
  html += `<div class="insight-item"><div class="label">商业化</div><p>${data.insights.commercial}</p></div>`;
  html += `<div class="insight-item" style="grid-column:1/-1"><div class="label">风险与空白</div><p>${data.insights.risks}</p></div>`;
  html += '</div></div>';

  document.getElementById('reportContent').innerHTML = html;
}

// 初始化
renderReport();
