<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jira 看板 - 简化版</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        .chip { display: inline-block; padding: 5px 10px; margin: 2px; background: #e0e0e0; border-radius: 15px; cursor: pointer; }
        .chip.selected { background: #4CAF50; color: white; }
        .section { margin-bottom: 20px; }
        .month { margin-bottom: 20px; border: 1px solid #ddd; padding: 10px; }
        .month-header { background: #4CAF50; color: white; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>📊 Jira 问题管理看板</h1>

    <div class="section">
        <h2>👥 关注人员</h2>
        <div id="chips"></div>
    </div>

    <div class="section">
        <h2>📅 月度发版看板</h2>
        <div id="monthly"></div>
    </div>

    <div class="section">
        <h2>📝 全部问题</h2>
        <table>
            <thead>
                <tr>
                    <th>Jira</th>
                    <th>标题</th>
                    <th>处理人</th>
                    <th>优先级</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody id="all-issues"></tbody>
        </table>
    </div>

    <script>
        let data = null;
        let selected = new Set(['周睿卿', '赵容慧']);

        // 加载数据
        fetch('boards/monthly-data.json')
            .then(r => r.json())
            .then(d => {
                data = d;
                render();
            })
            .catch(e => console.error('加载失败:', e));

        function render() {
            // 渲染人员选择
            const people = [...new Set(data.issues.map(i => i.assignee))].sort();
            document.getElementById('chips').innerHTML = people.map(p =>
                `<span class="chip ${selected.has(p) ? 'selected' : ''}" onclick="toggle('${p}')">${p}</span>`
            ).join('');

            // 渲染月度看板
            const monthlyPattern = /(\d+)月标插/;
            const monthlyIssues = data.issues.filter(i =>
                i.labels.some(l => monthlyPattern.test(l)) &&
                (selected.size === 0 || selected.has(i.assignee))
            );

            const grouped = {};
            monthlyIssues.forEach(i => {
                const m = i.labels.find(l => monthlyPattern.test(l));
                if (m) {
                    const month = m.match(monthlyPattern)[1] + '月';
                    if (!grouped[month]) grouped[month] = [];
                    grouped[month].push(i);
                }
            });

            document.getElementById('monthly').innerHTML = Object.keys(grouped).sort((a,b) => parseInt(b) - parseInt(a)).map(month => `
                <div class="month">
                    <div class="month-header">📆 ${month}标插 (${grouped[month].length} 个问题)</div>
                    <table>
                        <thead>
                            <tr><th>Jira</th><th>标题</th><th>处理人</th><th>优先级</th><th>状态</th></tr>
                        </thead>
                        <tbody>
                            ${grouped[month].map(i => `
                                <tr>
                                    <td><a href="https://jira.n.xiaomi.com/browse/${i.key}" target="_blank">${i.key}</a></td>
                                    <td>${i.summary}</td>
                                    <td>${i.assignee}</td>
                                    <td>${i.priority}</td>
                                    <td>${i.status}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('') || '<p>暂无月度标插问题</p>';

            // 渲染全部问题
            const allIssues = data.issues.filter(i => selected.size === 0 || selected.has(i.assignee));
            document.getElementById('all-issues').innerHTML = allIssues.map(i => `
                <tr>
                    <td><a href="https://jira.n.xiaomi.com/browse/${i.key}" target="_blank">${i.key}</a></td>
                    <td>${i.summary}</td>
                    <td>${i.assignee}</td>
                    <td>${i.priority}</td>
                    <td>${i.status}</td>
                </tr>
            `).join('');
        }

        function toggle(person) {
            if (selected.has(person)) {
                selected.delete(person);
            } else {
                selected.add(person);
            }
            render();
        }
    </script>
</body>
</html>
